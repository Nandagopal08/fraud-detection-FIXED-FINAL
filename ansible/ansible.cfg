[defaults]
inventory          = inventory.ini
host_key_checking  = False
remote_user        = ec2-user
private_key_file   = ~/.ssh/fraud-detection-key.pem
stdout_callback    = yaml
timeout            = 60

[ssh_connection]
ssh_args           = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining         = True
