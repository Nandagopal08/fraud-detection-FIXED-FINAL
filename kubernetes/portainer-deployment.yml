# kubernetes/portainer-deployment.yml
# Paper Section 3.3: Portainer as Docker cluster management UI
# NOTE: In k8s, Portainer manages the k8s cluster rather than Docker socket
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: fraud-detection
  labels:
    app: portainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portainer
  template:
    metadata:
      labels:
        app: portainer
    spec:
      containers:
        - name: portainer
          image: portainer/portainer-ce:2.20.3
          ports:
            - containerPort: 9000
          args: ["--no-analytics"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: portainer-data
              mountPath: /data
      volumes:
        - name: portainer-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: fraud-detection
  labels:
    app: portainer
spec:
  type: NodePort
  selector:
    app: portainer
  ports:
    - name: http
      protocol: TCP
      port: 9000
      targetPort: 9000
      nodePort: 30900
