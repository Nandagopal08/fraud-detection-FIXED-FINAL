# kubernetes/fraud-api-service.yml
apiVersion: v1
kind: Service
metadata:
  name: fraud-api
  namespace: fraud-detection
  labels:
    app: fraud-api
spec:
  type: NodePort
  selector:
    app: fraud-api
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500      # Access via: minikube ip:30500
