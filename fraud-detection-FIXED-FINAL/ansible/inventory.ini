# ansible/inventory.ini
# Replace SERVER_IP with the Terraform output: public_ip
# Run: terraform -chdir=../terraform output public_ip

[fraud_detection_servers]
fraud-server ansible_host=SERVER_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/YOUR_KEY.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
